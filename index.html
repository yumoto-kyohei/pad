<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description" content="パズドラ盤面練習アプリ" />
	<title>Puzzle Practice</title>
	<script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
	<script src="https://code.jquery.com/ui/1.11.3/jquery-ui.min.js"></script>
	<link rel="stylesheet" type="text/css" href="pad.css?v6">
	<link rel="stylesheet" type="text/css" href="menu.css?v2">
	<link rel="shortcut icon" href="favicon.ico" />
	<script src="pad.js?v6"></script>
</head>
<body><div id="wrapwrap">
	<div id="lineback">
		<button id="hamburgerBtn" aria-label="メニュー"><span></span><span></span><span></span></button>
		<button onclick="requestAction('help')" class="topbutton image3">?</button>
		<button onclick="requestAction('options')" class="topbutton image6">Options</button>
		<div style="float:right;line-height:25px">
			<span id="modeToggle">
				<button onclick="requestAction('setmode', 'play')" id="modePlayBtn" class="modebutton modebutton-active">Play</button><button onclick="requestAction('setmode', 'edit')" id="modeEditBtn" class="modebutton">Edit</button><button onclick="requestAction('setmode', 'analyze')" id="modeAnalyzeBtn" class="modebutton">解析</button>
			</span>
			<span id="appTitle">&nbsp;Puzzle Practice</span>
		</div>
	</div>
	<div id="game">
		<div id="playPanel">
			<button onclick="requestAction('timemode', 'countdown')" id="modeCountdownBtn" class="modebutton">制限</button>
			<button onclick="requestAction('timemode', 'measure')" id="modeMeasureBtn" class="modebutton modebutton-active">計測</button>
			<span id="countdownAdjust" style="display:none">
				<button onclick="requestAction('ctimer', 0)" class="topbutton image4" title="短く">Minus</button>
				<button onclick="requestAction('ctimer', 1)" class="topbutton image5" title="長く">Plus</button>
			</span>
			<button onclick="requestAction('replayarrows', showReplayArrows ? 0 : 1)" id="arrowToggleBtn" class="modebutton modebutton-active" title="操作後・リプレイ時にルートを表示">ルート表示</button>
			<div>Time: <span id="time">00.000s</span></div>
		</div>
		<div id="analyzePanel">
			<div id="analyzeLevels">
				精度:
				<button onclick="requestAction('analyzelevel', 'fast')" id="levelFastBtn" class="modebutton modebutton-active">速い(25手)</button>
				<button onclick="requestAction('analyzelevel', 'normal')" id="levelNormalBtn" class="modebutton">標準(35手)</button>
				<button onclick="requestAction('analyzelevel', 'deep')" id="levelDeepBtn" class="modebutton">詳細(50手)</button>
			</div>
			<button onclick="requestAction('analyze')" class="modebutton">解析開始</button>
			<div id="analyzeStatus"></div>
			<div id="analyzeResults"></div>
		</div>
		<div id="editPalette">
			<div id="boardSizeButtons">
				<button onclick="requestAction('setboardsize', '6x5')" id="size6x5Btn" class="modebutton modebutton-active">5&times;6</button>
				<button onclick="requestAction('setboardsize', '5x4')" id="size5x4Btn" class="modebutton">5&times;4</button>
				<button onclick="requestAction('setboardsize', '7x6')" id="size7x6Btn" class="modebutton">7&times;6</button>
				<label for="screenshotInput" class="modebutton" style="cursor:pointer">スクショ読込</label>
				<input type="file" id="screenshotInput" accept="image/*" style="display:none">
			</div>
			<button class="paletteSwatch red" onclick="requestAction('selectpaint', 'red')" title="Red"></button>
			<button class="paletteSwatch blue" onclick="requestAction('selectpaint', 'blue')" title="Blue"></button>
			<button class="paletteSwatch green" onclick="requestAction('selectpaint', 'green')" title="Green"></button>
			<button class="paletteSwatch light" onclick="requestAction('selectpaint', 'light')" title="Light"></button>
			<button class="paletteSwatch dark" onclick="requestAction('selectpaint', 'dark')" title="Dark"></button>
			<button class="paletteSwatch heart" onclick="requestAction('selectpaint', 'heart')" title="Heart"></button>
			<button class="paletteSwatch jammer" onclick="requestAction('selectpaint', 'jammer')" title="Jammer"></button>
			<button class="paletteSwatch poison" onclick="requestAction('selectpaint', 'poison')" title="Poison"></button>
			<div id="genConfig">
				Random生成(タップで色ON/OFF、数字で個数指定):
				<div id="genCols">
					<span class="genCol"><button id="genChip-red" class="genChip red selected" onclick="requestAction('genchip', 'red')"></button><input id="genCount-red" class="genCount" type="number" min="0" placeholder="-"></span>
					<span class="genCol"><button id="genChip-blue" class="genChip blue selected" onclick="requestAction('genchip', 'blue')"></button><input id="genCount-blue" class="genCount" type="number" min="0" placeholder="-"></span>
					<span class="genCol"><button id="genChip-green" class="genChip green selected" onclick="requestAction('genchip', 'green')"></button><input id="genCount-green" class="genCount" type="number" min="0" placeholder="-"></span>
					<span class="genCol"><button id="genChip-light" class="genChip light selected" onclick="requestAction('genchip', 'light')"></button><input id="genCount-light" class="genCount" type="number" min="0" placeholder="-"></span>
					<span class="genCol"><button id="genChip-dark" class="genChip dark selected" onclick="requestAction('genchip', 'dark')"></button><input id="genCount-dark" class="genCount" type="number" min="0" placeholder="-"></span>
					<span class="genCol"><button id="genChip-heart" class="genChip heart selected" onclick="requestAction('genchip', 'heart')"></button><input id="genCount-heart" class="genCount" type="number" min="0" placeholder="-"></span>
				</div>
			</div>
		</div>
		<div id="orbCountBar">
			<span class="orbCount"><img src="img/Red.png"><span id="orbCount-red">0</span></span>
			<span class="orbCount"><img src="img/Blue.png"><span id="orbCount-blue">0</span></span>
			<span class="orbCount"><img src="img/Green.png"><span id="orbCount-green">0</span></span>
			<span class="orbCount"><img src="img/Light.png"><span id="orbCount-light">0</span></span>
			<span class="orbCount"><img src="img/Dark.png"><span id="orbCount-dark">0</span></span>
			<span class="orbCount"><img src="img/Heart.png"><span id="orbCount-heart">0</span></span>
			<span class="orbCount"><img src="img/Jammer.png"><span id="orbCount-jammer">0</span></span>
			<span class="orbCount"><img src="img/Poison.png"><span id="orbCount-poison">0</span></span>
		</div>
		<div id="board">
			<div id="boardBg"></div>
			<div id="arrowSurfaceC">
				<canvas id="arrowSurface" width="540px" height="450px"></canvas>
			</div>
			<div id="tiles"></div>
			<button id="showDrops" style="display:none" onclick="requestAction('showdrops')">Show Drops</button>
		</div>
	</div>
	<div id="buttons">
		<button id="random" class="editOnly" onclick="requestAction('editrandom')">Random</button>
		<button class="playOnly" onclick="requestAction('loadboard')">Reset</button>
		<button class="playOnly" onclick="requestAction('replay')">Replay</button>
		<button class="playOnly" onclick="requestAction('copypattern')">Share</button>
		<button class="playOnly" onclick="requestAction('changetheworld')">CtW</button>
		<button class="playOnly" id="skyfallBtn" onclick="requestAction('skyfall')">落ちコン</button>
		<button class="playOnly" id="playStyleBtn" onclick="requestAction('playstyle')">単発</button>
		<div id="colorchange"><textarea id="entry" maxlength=30></textarea>
		<button onclick="requestAction('applypattern');" id="convert" style="margin-bottom:10px">apply</button>
		<input type="text" placeholder="H" maxlength="2" id="colorfrom" name="colorfrom">
		<input type="text" placeholder="G" maxlength="2" id="colorto" name="colorto">
		<br /><button onclick="requestAction('convert')" id="convert">convert</button></div>
	</div>
	<div id="library">
		<div id="libraryHeader">
			<div style="float:left;line-height:30px;font-weight:bold">My Boards</div>
			<button onclick="requestAction('savepattern')" style="float:right">Save Current Board</button>
		</div>
		<div id="libraryList"></div>
	</div>
	<div id="infobooth">
	</div><script src="jquery.ui.touch-punch.min.js"></script>
</div>
<div id="menuOverlay"></div>
<nav id="sideMenu">
	<a href="index.html" class="active">パズル練習</a>
	<a href="rankings.html">ランキングダンジョン</a>
	<a href="speedrun.html">最速チャレンジ</a>
</nav>
<script src="menu.js?v1"></script>
</body>
</html>
