<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description" content="パズドラ盤面練習アプリ" />
	<title>Puzzle Practice</title>
	<script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>
	<script src="https://code.jquery.com/ui/1.11.3/jquery-ui.min.js"></script>
	<link rel="stylesheet" type="text/css" href="pad.css?v1">
	<link rel="shortcut icon" href="favicon.ico" />
	<script src="pad.js?v1"></script>
</head>
<body><div id="wrapwrap">
	<div id="lineback">
		<button onclick="requestAction('help')" class="topbutton image3">?</button>
		<button onclick="requestAction('options')" class="topbutton image6">Options</button>
		<div style="float:right;line-height:25px">
			<span id="modeToggle">
				<button onclick="requestAction('setmode', 'play')" id="modePlayBtn" class="modebutton modebutton-active">Play</button><button onclick="requestAction('setmode', 'edit')" id="modeEditBtn" class="modebutton">Edit</button>
			</span>
			<span id="appTitle">&nbsp;Puzzle Practice</span>
		</div>
	</div>
	<div id="game">
		<div id="playPanel">
			<button onclick="requestAction('timemode', 'countdown')" id="modeCountdownBtn" class="modebutton">制限</button>
			<button onclick="requestAction('timemode', 'measure')" id="modeMeasureBtn" class="modebutton modebutton-active">計測</button>
			<span id="countdownAdjust" style="display:none">
				<button onclick="requestAction('ctimer', 0)" class="topbutton image4" title="短く">Minus</button>
				<button onclick="requestAction('ctimer', 1)" class="topbutton image5" title="長く">Plus</button>
			</span>
			<button onclick="requestAction('replayarrows', showReplayArrows ? 0 : 1)" id="arrowToggleBtn" class="modebutton modebutton-active" title="操作後・リプレイ時にルートを表示">ルート表示</button>
			<div>Time: <span id="time">00.000s</span></div>
		</div>
		<div id="editPalette">
			<div id="boardSizeButtons">
				<button onclick="requestAction('setboardsize', '6x5')" id="size6x5Btn" class="modebutton modebutton-active">5&times;6</button>
				<button onclick="requestAction('setboardsize', '5x4')" id="size5x4Btn" class="modebutton">5&times;4</button>
				<button onclick="requestAction('setboardsize', '7x6')" id="size7x6Btn" class="modebutton">7&times;6</button>
			</div>
			<button class="paletteSwatch red" onclick="requestAction('selectpaint', 'red')" title="Red"></button>
			<button class="paletteSwatch blue" onclick="requestAction('selectpaint', 'blue')" title="Blue"></button>
			<button class="paletteSwatch green" onclick="requestAction('selectpaint', 'green')" title="Green"></button>
			<button class="paletteSwatch light" onclick="requestAction('selectpaint', 'light')" title="Light"></button>
			<button class="paletteSwatch dark" onclick="requestAction('selectpaint', 'dark')" title="Dark"></button>
			<button class="paletteSwatch heart" onclick="requestAction('selectpaint', 'heart')" title="Heart"></button>
			<button class="paletteSwatch jammer" onclick="requestAction('selectpaint', 'jammer')" title="Jammer"></button>
			<button class="paletteSwatch poison" onclick="requestAction('selectpaint', 'poison')" title="Poison"></button>
		</div>
		<div id="board">
			<div id="boardBg"></div>
			<div id="arrowSurfaceC">
				<canvas id="arrowSurface" width="540px" height="450px"></canvas>
			</div>
			<div id="tiles"></div>
			<button id="showDrops" style="display:none" onclick="requestAction('showdrops')">Show Drops</button>
		</div>
	</div>
	<div id="buttons">
		<button id="random" onclick="requestAction('randomize')">Random</button>
		<button onclick="requestAction('loadboard')">Reset</button>
		<button onclick="requestAction('replay')">Replay</button>
		<button onclick="requestAction('copypattern')">Share</button>
		<button onclick="requestAction('changetheworld')">CtW</button>
		<button onclick="requestAction('skyfall')">SkyFall</button>
		<div id="colorchange"><textarea id="entry" maxlength=30></textarea>
		<button onclick="requestAction('applypattern');" id="convert" style="margin-bottom:10px">apply</button>
		<input type="text" placeholder="H" maxlength="2" id="colorfrom" name="colorfrom">
		<input type="text" placeholder="G" maxlength="2" id="colorto" name="colorto">
		<br /><button onclick="requestAction('convert')" id="convert">convert</button></div>
	</div>
	<div id="library">
		<div id="libraryHeader">
			<div style="float:left;line-height:30px;font-weight:bold">My Boards</div>
			<button onclick="requestAction('savepattern')" style="float:right">Save Current Board</button>
		</div>
		<div id="libraryList"></div>
	</div>
	<div id="infobooth">
	</div><script src="jquery.ui.touch-punch.min.js"></script>
</div>
</body>
</html>
